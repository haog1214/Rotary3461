<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="line-redirect.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>總監月刊 | 國際扶輪第3461地區</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a458b;
      --dark:    #0d1e3d;
      --gold:    #f0c040;
      --gold2:   #d4940a;
      --overlay: rgba(13,30,61,0.92);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans TC', sans-serif; color: #222; background: #f0f2f8; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* ── Reveal ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.from-scale { transform: scale(0.93); opacity: 0; }
    .reveal.visible    { opacity: 1 !important; transform: none !important; }
    .reveal.d1 { transition-delay:.05s } .reveal.d2 { transition-delay:.1s }
    .reveal.d3 { transition-delay:.15s } .reveal.d4 { transition-delay:.2s }
    .reveal.d5 { transition-delay:.25s } .reveal.d6 { transition-delay:.3s }

    /* ════════ SITE HEADER ════════ */
    .site-header { position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,.15); background: url('images/nav-bg.jpg') left center/cover no-repeat; background-color: #dce8f0; }
    .header-logo-row { height: 100px; display: flex; align-items: center; padding: 0 24px; transition: height .3s; }
    .header-logo-inner { max-width: 1440px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .site-logo img { width: 437px; height: 82px; object-fit: contain; display: block; }
    .header-slogan img { height: 72px; width: auto; display: block; }
    .compact-nav { display: none; align-items: stretch; flex: 1; height: 100%; overflow: visible; }
    .compact-nav .nav-item { flex: 1; position: relative; }
    .header-nav-row { background: transparent; }
    .desktop-nav { display: flex; align-items: stretch; width: 100%; }
    .nav-item { flex: 1; position: relative; }
    .nav-link { display: flex; align-items: center; justify-content: center; gap: 4px; color: #222; font-size: 16.5px; font-weight: 600; height: 52px; width: 100%; white-space: nowrap; transition: background .18s; cursor: pointer; letter-spacing: .5px; }
    .nav-link:hover, .nav-item:hover .nav-link { background: rgba(0,0,0,.12); }
    .sub-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 170px; box-shadow: 0 6px 24px rgba(0,0,0,.15); border-top: 3px solid var(--gold); z-index: 200; }
    .nav-item:hover .sub-menu { display: block; }
    .sub-menu a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background .15s; }
    .sub-menu a:last-child { border-bottom: none; }
    .sub-menu a:hover { background: var(--primary); color: #fff; }
    .sub-menu--cols { display: none; position: absolute; top: 100%; left: 0; background: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.15); border-top: 3px solid var(--gold); z-index: 200; flex-direction: row; min-width: 480px; }
    .nav-item:hover .sub-menu--cols { display: flex; }
    .nav-item:last-child .sub-menu, .nav-item:last-child .sub-menu--cols,
    .nav-item:nth-last-child(2) .sub-menu, .nav-item:nth-last-child(2) .sub-menu--cols { left: auto; right: 0; }
    .sub-menu-col { min-width: 160px; border-right: 1px solid #f0f0f0; flex: 1; }
    .sub-menu-col:last-child { border-right: none; }
    .sub-menu-col a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background .15s; white-space: nowrap; }
    .sub-menu-col a:last-child { border-bottom: none; }
    .sub-menu-col a:hover { background: var(--primary); color: #fff; }
    .site-header.scrolled .header-logo-row { height: 76px; }
    .site-header.scrolled .site-logo img { width: auto; height: 48px; }
    .site-header.scrolled .header-slogan { display: none; }
    .site-header.scrolled .header-nav-row { display: none; }
    .site-header.scrolled .compact-nav { display: flex; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #333; border-radius: 2px; transition: all .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav-row { display: none; height: 48px; align-items: center; justify-content: flex-end; padding: 0 16px; }
    .mobile-menu { display: none; position: fixed; top: 188px; left: 0; right: 0; bottom: 0; background: var(--overlay); z-index: 999; overflow-y: auto; padding-bottom: 40px; }
    .mobile-menu.open { display: block; }
    .mobile-nav-item { border-bottom: 1px solid rgba(255,255,255,.08); }
    .mobile-nav-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; color: #fff; font-size: 18px; font-weight: 500; cursor: pointer; }
    .mobile-nav-top svg { transition: transform .25s; }
    .mobile-nav-item.expanded .mobile-nav-top svg { transform: rotate(90deg); }
    .mobile-sub { display: none; background: rgba(255,255,255,.05); }
    .mobile-nav-item.expanded .mobile-sub { display: block; }
    .mobile-sub a { display: block; padding: 12px 36px; color: rgba(255,255,255,.8); font-size: 15px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .mobile-sub a:hover { color: var(--gold); }
    @media (max-width: 900px) {
      .header-logo-row { height: 80px; padding: 0 16px; }
      .site-logo img { width: auto; height: 52px; max-width: 280px; }
      .header-slogan, .desktop-nav { display: none; }
      .compact-nav { display: none !important; }
      .mobile-nav-row { display: flex; }
      .hamburger { display: flex; }
      .mobile-menu { top: 128px; }
      .site-header.scrolled .header-logo-row { height: 60px; }
      .site-header.scrolled .site-logo img { height: 38px; }
    }

    /* ════════ MAIN LAYOUT ════════ */
    .page-layout {
      display: flex;
      min-height: calc(100vh - 152px);
      background: #fff;
    }

    /* ════════ LEFT SIDEBAR (year selector) ════════ */
    .year-sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 140px;
      background: #fff;
      border-right: 1px solid #e5e9f2;
      padding: 28px 14px;
      padding-top: 168px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 50;
    }
    .year-sidebar-label {
      font-size: 10px; font-weight: 800; color: #bbb;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 0 6px; margin-bottom: 6px;
    }
    .year-tab {
      width: 100%; padding: 11px 12px;
      font-size: 14px; font-weight: 700; color: #666;
      border: 2px solid transparent; border-radius: 8px;
      cursor: pointer; text-align: center; white-space: nowrap;
      transition: all .18s; background: none;
      font-family: inherit;
    }
    .year-tab:hover { background: #f0f4ff; color: var(--primary); }
    .year-tab.active {
      background: var(--primary); color: #fff;
      border-color: var(--primary);
    }

    /* ════════ CONTENT AREA ════════ */
    .content-area { flex: 1; padding: 28px 28px 60px; min-width: 0; margin-left: 140px; }

    .year-info-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .year-info-title { font-size: 20px; font-weight: 900; color: var(--dark); }
    .year-info-title > span:first-child {
      display: inline-block; width: 4px; height: 20px;
      background: var(--gold); border-radius: 2px;
      vertical-align: middle; margin-right: 10px;
    }
    .issue-count {
      font-size: 12px; color: #888;
      background: #f0f2f8; padding: 3px 12px; border-radius: 16px;
    }

    /* ════════ MAGAZINE GRID (4 per row) ════════ */
    .mag-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .mag-card {
      cursor: pointer;
      display: flex; flex-direction: column;
      border-radius: 10px; overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 10px rgba(0,0,0,.09);
      border: 1px solid #e8ecf5;
      transition: transform .25s, box-shadow .25s;
    }
    .mag-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(26,69,139,.18);
    }
    /* 4px white padding around cover */
    .mag-cover-wrap {
      padding: 4px; background: #fff;
    }
    .mag-cover {
      width: 100%; aspect-ratio: 0.707;
      background: #eef2f8;
      position: relative; overflow: hidden;
      border-radius: 4px;
    }
    .mag-cover img,
    .mag-cover canvas {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .4s;
    }
    .mag-card:hover .mag-cover img,
    .mag-card:hover .mag-cover canvas { transform: scale(1.04); }
    .mag-cover-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.5) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .mag-cover.loaded .mag-cover-shimmer { display: none; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .mag-body { padding: 10px 12px 12px; }
    .mag-no { font-size: 10px; font-weight: 800; color: var(--gold2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .mag-month { font-size: 12px; font-weight: 600; color: var(--dark); line-height: 1.4; }

    @media (max-width: 900px) {
      .year-sidebar { width: 100px; padding-left: 8px; padding-right: 8px; }
      .year-tab { font-size: 12px; padding: 9px 8px; }
      .content-area, .inner-footer, .footer-bar { margin-left: 100px; }
      .mag-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .year-sidebar { width: 80px; }
      .content-area, .inner-footer, .footer-bar { margin-left: 80px; }
      .mag-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }

    /* ══ 手機版專屬重設 ══ */
    @media (max-width: 768px) {
      /* ── 年度選單改成頂部水平 Bar ── */
      .page-layout { flex-direction: column; }

      .year-sidebar {
        position: static !important;
        width: 100% !important;
        height: auto !important;
        padding: 10px 12px !important;
        padding-top: 10px !important;
        border-right: none !important;
        border-bottom: 2px solid #e5e9f2 !important;
        flex-direction: row !important;
        overflow-x: auto !important;
        overflow-y: visible !important;
        gap: 8px !important;
        scrollbar-width: none !important;
        background: #fff !important;
        z-index: 10 !important;
        box-shadow: 0 2px 8px rgba(0,0,0,.06) !important;
      }
      .year-sidebar::-webkit-scrollbar { display: none; }
      .year-sidebar-label { display: none !important; }
      #yearTabs {
        display: flex !important;
        flex-direction: row !important;
        gap: 8px !important;
      }
      .year-tab {
        flex-shrink: 0 !important;
        white-space: nowrap !important;
        width: auto !important;
        padding: 8px 18px !important;
        font-size: 13px !important;
        border-radius: 20px !important;
      }

      /* ── 內容區：移除左邊距 ── */
      .content-area {
        margin-left: 0 !important;
        padding: 16px 12px 40px !important;
      }
      .inner-footer, .footer-bar {
        margin-left: 0 !important;
      }

      /* ── 月刊格：一排兩本 ── */
      .mag-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 12px !important;
      }

      /* ── Flipbook：滿版單頁 ── */
      .flipbook-overlay { flex-direction: column; }

      /* 頂部 Bar：精簡，只保留標題和 Drive 連結 */
      .fb-topbar {
        justify-content: space-between !important;
        padding: 0 16px !important;
        height: 48px !important;
        min-height: 48px !important;
        flex-wrap: nowrap !important;
      }
      .fb-logo-area { gap: 8px !important; }
      .fb-logo-img  { height: 24px !important; }
      .fb-divider   { height: 20px !important; }
      .fb-title     { font-size: 12px !important; }
      .fb-subtitle  { font-size: 10px !important; }

      /* 頂部只留 Drive 和 fb-close（fb-close 移至底部，在此隱藏） */
      .fb-actions { gap: 6px !important; }
      #fbFullscreen { display: none !important; }
      .fb-topbar .fb-close { display: none !important; } /* 頂部關閉隱藏 */

      /* Stage：滿版顯示 */
      .fb-stage {
        padding: 0 !important;
        align-items: flex-start !important;
        overflow: hidden !important;
      }
      .fb-row { gap: 0 !important; width: 100% !important; justify-content: center; }

      /* 左右翻頁按鈕隱藏（手指滑動） */
      .nav-btn { display: none !important; }

      /* 底部 Bar：頁碼 + 關閉按鈕 */
      .fb-bottombar {
        height: 64px !important;
        gap: 16px !important;
        padding: 0 24px !important;
        justify-content: space-between !important;
      }
      .key-hint { display: none !important; }
      .page-pill { font-size: 13px !important; }

      /* 底部關閉按鈕 */
      .fb-close-bottom {
        display: flex !important;
        align-items: center; justify-content: center;
        width: 48px; height: 48px;
        background: rgba(220,50,50,.8);
        border: none; border-radius: 50%;
        color: #fff; font-size: 22px;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,.5);
        flex-shrink: 0;
        transition: background .2s;
      }
      .fb-close-bottom:hover { background: rgba(200,30,30,1); }

      /* ── 玻璃效果引導頁 ── */
      .mob-intro-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8,14,30,0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        animation: mobIntroIn .4s ease;
        cursor: pointer;
      }
      .mob-intro-overlay.hide {
        animation: mobIntroOut .35s ease forwards;
        pointer-events: none;
      }
      @keyframes mobIntroIn  { from { opacity:0; } to { opacity:1; } }
      @keyframes mobIntroOut { from { opacity:1; } to { opacity:0; } }

      .mob-intro-card {
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.22);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: 28px;
        padding: 36px 32px 28px;
        text-align: center;
        color: #fff;
        max-width: 82vw;
        box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18);
      }
      .mob-intro-title-txt {
        font-size: 16px; font-weight: 700;
        margin-bottom: 4px; letter-spacing: .5px;
      }
      .mob-intro-sub-txt {
        font-size: 12px; color: rgba(255,255,255,.6);
        margin-bottom: 28px;
      }

      /* 翻頁示意圖：左箭頭 + 書 + 右箭頭 */
      .mob-intro-demo {
        display: flex; align-items: center; justify-content: center;
        gap: 16px; margin-bottom: 20px;
      }
      .mob-intro-arrow {
        display: flex; flex-direction: column; align-items: center; gap: 4px;
        opacity: .8;
      }
      .mob-intro-arrow svg { display: block; }
      .mob-intro-arrow span { font-size: 10px; letter-spacing: .5px; color: rgba(255,255,255,.7); }

      /* 手勢動畫線稿 */
      .mob-intro-book svg { display: block; }

      /* 滑動提示動畫 */
      .swipe-anim {
        animation: swipePulse 1.6s ease-in-out infinite;
      }
      @keyframes swipePulse {
        0%, 100% { transform: translateX(0); opacity:.8; }
        50%       { transform: translateX(6px); opacity:1; }
      }
      .swipe-anim-l {
        animation: swipePulseL 1.6s ease-in-out infinite;
      }
      @keyframes swipePulseL {
        0%, 100% { transform: translateX(0); opacity:.8; }
        50%       { transform: translateX(-6px); opacity:1; }
      }

      .mob-intro-hint {
        font-size: 13px; color: rgba(255,255,255,.85);
        line-height: 1.6; margin-bottom: 24px;
      }
      .mob-intro-tap {
        display: inline-block;
        background: rgba(255,255,255,.15);
        border: 1px solid rgba(255,255,255,.3);
        border-radius: 20px;
        padding: 8px 24px;
        font-size: 13px; font-weight: 600;
        letter-spacing: .5px;
        color: #fff;
        animation: tapPulse 2s ease-in-out infinite;
      }
      @keyframes tapPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        50%       { box-shadow: 0 0 0 8px rgba(255,255,255,.08); }
      }
    }

    /* ════════ FLIPBOOK OVERLAY ════════ */
    .flipbook-overlay {
      position: fixed; inset: 0;
      background: #0d0e12;
      z-index: 2000;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    .flipbook-overlay.open { opacity: 1; pointer-events: all; }

    .fb-topbar {
      height: 60px; flex-shrink: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .fb-logo-area { display: flex; align-items: center; gap: 16px; }
    .fb-logo-img { height: 40px; width: auto; display: block; object-fit: contain; filter: brightness(0) invert(1); }
    .fb-divider { width: 1px; height: 32px; background: rgba(255,255,255,.2); flex-shrink: 0; }
    .fb-title { color: #fff; font-size: 14px; font-weight: 700; }
    .fb-subtitle { color: rgba(255,255,255,.5); font-size: 11px; margin-top: 1px; }
    .fb-actions { display: flex; gap: 8px; align-items: center; }
    .fb-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.8); font-size: 12px; padding: 6px 14px;
      border-radius: 20px; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: 5px;
      font-family: inherit; text-decoration: none;
    }
    .fb-btn:hover { background: rgba(255,255,255,.2); color: #fff; }
    .fb-close {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      color: #fff; font-size: 18px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; line-height: 1;
    }
    .fb-close:hover { background: rgba(220,50,50,.6); }

    .fb-stage {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px; overflow: hidden;
    }
    .fb-row { display: flex; align-items: center; gap: 20px; }
    .nav-btn {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      color: #fff; font-size: 28px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s; flex-shrink: 0; line-height: 1;
    }
    .nav-btn:hover   { background: rgba(255,255,255,.22); }
    .nav-btn:active  { transform: scale(.9); }
    .nav-btn:disabled { opacity: .2; cursor: not-allowed; transform: none; }
    .book-wrap {
      box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 24px 72px rgba(0,0,0,.9);
      border-radius: 2px;
    }

    .fb-bottombar {
      height: 52px; flex-shrink: 0;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; justify-content: center; gap: 24px;
    }
    .page-pill {
      background: rgba(255,255,255,.12); color: rgba(255,255,255,.8);
      font-size: 12px; padding: 4px 18px; border-radius: 12px;
      font-family: 'Roboto', sans-serif;
    }
    .key-hint { color: rgba(255,255,255,.3); font-size: 11px; }

    .fb-loading {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      color: rgba(255,255,255,.6); font-size: 14px; text-align: center;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--gold);
      border-radius: 50%; animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════ FOOTER ════════ */
    .inner-footer { background: #fff; border-top: 1px solid #e5e7eb; padding: 24px 32px; margin-left: 140px; }
    .inner-footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .inner-footer-logo img { height: 60px; width: auto; display: block; }
    .inner-footer-contact { color: #555; font-size: 13px; line-height: 2; flex: 1; min-width: 220px; text-align: center; }

/* ── Render PDF cover thumbnail ── */
async function renderPdfCover(covEl, pdfPath) {
  try {
    if (!window.pdfjsLib) return;
    const pdf  = await pdfjsLib.getDocument({ url: pdfPath, withCredentials: false }).promise;
    const page = await pdf.getPage(1);
    const vp0  = page.getViewport({ scale: 1 });
    const scale = covEl.offsetWidth / vp0.width || 1;
    const vp   = page.getViewport({ scale: Math.max(scale, 0.5) });
    const cv   = document.createElement('canvas');
    cv.width   = Math.round(vp.width);
    cv.height  = Math.round(vp.height);
    cv.style.width  = '100%';
    cv.style.height = '100%';
    cv.style.display = 'block';
    cv.style.objectFit = 'cover';
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, cv.width, cv.height);
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
    covEl.innerHTML = '';
    covEl.appendChild(cv);
    covEl.classList.add('loaded');
  } catch(e) {
    covEl.classList.add('loaded');
  }
}

/* ── Gallery render ── */
function renderYear(key) {
  const data = DATA[key] || DATA[yearKeys[0]];
  yearHeading.textContent = data.heading;
  issueCount.textContent  = `共 ${data.issues.length} 期`;
  magGrid.innerHTML = '';
  data.issues.forEach((issue, i) => {
    const covId = `cov-${key}-${i}`;
    const card = document.createElement('div');
    card.className = 'mag-card reveal from-scale d' + Math.min(i + 1, 6);

    if (issue.id) {
      // Google Drive thumbnail
      const thumb = `https://drive.google.com/thumbnail?id=${issue.id}&sz=w400`;
      card.innerHTML = `
        <div class="mag-cover-wrap">
          <div class="mag-cover" id="${covId}">
            <img src="${thumb}" alt="${issue.no}" loading="lazy"
                 onload="document.getElementById('${covId}').classList.add('loaded')"
                 onerror="renderPdfCover(document.getElementById('${covId}'), '${issue.local || ''}')">
            <div class="mag-cover-shimmer"></div>
          </div>
        </div>
        <div class="mag-body">
          <div class="mag-no">${issue.no}</div>
          <div class="mag-month">${issue.month}</div>
        </div>`;
    } else {
      // Local PDF — render with pdf.js
      card.innerHTML = `
        <div class="mag-cover-wrap">
          <div class="mag-cover" id="${covId}">
            <div class="mag-cover-shimmer"></div>
          </div>
        </div>
        <div class="mag-body">
          <div class="mag-no">${issue.no}</div>
          <div class="mag-month">${issue.month}</div>
        </div>`;
      // Defer PDF rendering so DOM is ready
      setTimeout(() => {
        const covEl = document.getElementById(covId);
        if (covEl && issue.local) renderPdfCover(covEl, issue.local);
      }, 50 + i * 30);
    }

    card.addEventListener('click', () => openFlipper(issue, key, i));
    magGrid.appendChild(card);
  });
  document.querySelectorAll('.mag-card.reveal').forEach(el => ro.observe(el));

  /* ── 載入時若 URL 含期數，自動開啟 ── */
  if (key === activeYear && _initIssue) {
    const idx = DATA[key].issues.findIndex(iss => iss.no.replace('NO.', '') === _initIssue);
    if (idx !== -1) setTimeout(() => openFlipper(DATA[key].issues[idx], key, idx), 300);
  }
}

/* ── Flipbook ── */
function showLoading(w, h, msg) {
  bookWrap.innerHTML = `<div style="width:${w}px;height:${h}px;display:flex;align-items:center;justify-content:center;">
    <div class="fb-loading"><div class="spinner"></div><div>${msg}</div></div></div>`;
  pagePill.textContent = '載入中…';
}
function showError(w, h, driveId) {
  if (driveId) {
    /* Google Drive iframe 嵌入 */
    const { w: fw, h: fh } = calcSize(595, 842);
    const embedW = isMobile() ? fw : fw * 2;
    bookWrap.innerHTML = `<iframe
      src="https://drive.google.com/file/d/${driveId}/preview"
      style="width:${embedW}px;height:${fh}px;border:none;background:#222;"
      allow="autoplay"
      allowfullscreen></iframe>`;
    pagePill.textContent = 'Google Drive 預覽';
    btnPrev.disabled = btnNext.disabled = true;
  } else {
    bookWrap.innerHTML = `<div style="width:${w}px;height:${h}px;display:flex;align-items:center;justify-content:center;">
      <div class="fb-loading">
        <div style="font-size:38px">⚠️</div>
        <div>無法直接載入 PDF</div>
        ${fbDriveLink.href !== '#' ? `<a href="${fbDriveLink.href}" target="_blank" style="margin-top:12px;background:var(--gold);color:var(--dark);padding:8px 20px;border-radius:20px;font-weight:700;text-decoration:none;font-size:13px;">在 Drive 開啟</a>` : ''}
      </div></div>`;
    pagePill.textContent = '載入失敗';
  }
}
function isMobile() { return window.innerWidth <= 768; }

function calcSize(pdfW, pdfH) {
  if (isMobile()) {
    // 手機：單頁滿版
    const avH = window.innerHeight - 100;  // topbar + bottombar
    const avW = window.innerWidth - 0;
    const s   = Math.min(avH / pdfH, avW / pdfW);
    return { w: Math.round(pdfW * s), h: Math.round(pdfH * s), s, portrait: true };
  }
  const avH = window.innerHeight - 130;
  const avW = (window.innerWidth - 200) / 2;
  const s   = Math.min(avH / pdfH, avW / pdfW, 1.8);
  return { w: Math.round(pdfW * s), h: Math.round(pdfH * s), s, portrait: false };
}

function showMobIntro(issue) {
  if (window.innerWidth > 768) return;
  mobIntroTitle.textContent = `總監月刊 ${issue.no}`;
  mobIntroSub.textContent   = issue.month;

  // 點擊任意處關閉引導頁

    mobIntroOv.classList.add('hide');

    mobIntroOv.removeEventListener('click', dismiss);
  };

}

function toggleMobBottomClose() {

async function openFlipper(issue, yearKey, issueIdx) {
  /* ── 更新網址路徑，讓每一期有獨立 URL ── */
  if (yearKey !== undefined && issue.no) {
    const issueNo = issue.no.replace('NO.', '');
    pushIssuePath(yearKey, issueNo);
  }
  if (pageFlip) { try { pageFlip.destroy(); } catch(_) {} pageFlip = null; }
  totalPages = 0;
  btnPrev.disabled = btnNext.disabled = true;
  fbTitle.textContent    = `總監月刊 ${issue.no}`;
  fbSubtitle.textContent = issue.month;
  fbDriveLink.href = issue.id ? `https://drive.google.com/file/d/${issue.id}/view` : '#';
  fbDriveLink.style.display = issue.id ? '' : 'none';
  toggleMobBottomClose();
  showLoading(520, 680, 'PDF 載入中…');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  showMobIntro(issue);

  const urls = [
    issue.local || null,
    issue.id ? `https://drive.usercontent.google.com/download?id=${issue.id}&export=download&authuser=0` : null,
    issue.id ? `https://drive.google.com/uc?export=download&id=${issue.id}` : null,
  ].filter(Boolean);

  let pdf = null;
  for (const url of urls) {
    try { pdf = await pdfjsLib.getDocument({ url, withCredentials: false }).promise; break; } catch(_) {}
  }
  if (!pdf) { showError(520, 680, issue.id || null); return; }

  totalPages = pdf.numPages;
  const fp   = await pdf.getPage(1);
  const vp0  = fp.getViewport({ scale: 1 });
  const { w, h, s, portrait } = calcSize(vp0.width, vp0.height);
  const imgs = [];
  for (let i = 1; i <= totalPages; i++) {
    const pg = await pdf.getPage(i);
    const vp = pg.getViewport({ scale: s });
    const cv = document.createElement('canvas');
    cv.width = Math.round(vp.width); cv.height = Math.round(vp.height);
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
    await pg.render({ canvasContext: ctx, viewport: vp }).promise;
    imgs.push(cv.toDataURL('image/jpeg', 0.92));
    pagePill.textContent = `渲染中… ${Math.round(i / totalPages * 100)}%`;
    if (i === 1) showLoading(portrait ? w : w * 2, h, `渲染中… 1/${totalPages}`);
  }

  bookWrap.innerHTML = '';
  const el = document.createElement('div');
  bookWrap.appendChild(el);
  pageFlip = new St.PageFlip(el, {
    width: w, height: h, size: 'fixed',
    minWidth: w, maxWidth: w, minHeight: h, maxHeight: h,
    showCover: true,
    usePortrait: portrait,    // 手機單頁直排
    drawShadow: !portrait,
    flippingTime: portrait ? 450 : 700,
    useMouseEvents: true,
    swipeDistance: portrait ? 20 : 30,  // 手機更靈敏
    clickEventForward: true,
  });
  pageFlip.loadFromImages(imgs);
  updatePill();
  pageFlip.on('flip', updatePill);
  pageFlip.on('changeState', updatePill);
}

function updatePill() {
  if (!pageFlip) return;
  const idx = pageFlip.getCurrentPageIndex();
  pagePill.textContent = `第 ${idx + 1} 頁 / 共 ${totalPages} 頁`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx >= totalPages - 1;
}

btnPrev.addEventListener('click', () => pageFlip?.flipPrev());
btnNext.addEventListener('click', () => pageFlip?.flipNext());

function closeFlipper() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  if (pageFlip) { try { pageFlip.destroy(); } catch(_) {} pageFlip = null; }
  bookWrap.innerHTML = '';
  /* ── 關閉時回到年度路徑 ── */
  pushYearPath(activeYear);
}
