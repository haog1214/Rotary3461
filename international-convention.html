<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>國際年會 | 國際扶輪第3461地區</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a458b;
      --dark: #1a2d5c;
      --gold: #f0c040;
      --overlay: rgba(26,45,92,0.92);
    }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f8; color: #222; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Site Header ── */
    .site-header { position: relative; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); background: url('images/nav-bg.jpg') left center / cover no-repeat; background-color: #dce8f0; flex-shrink: 0; }
    .header-logo-row { background: transparent; height: 100px; display: flex; align-items: center; padding: 0 24px; transition: height 0.3s; }
    .header-logo-inner { max-width: 1440px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .site-logo { display: flex; align-items: center; flex-shrink: 0; }
    .site-logo img { width: 437px; height: 82px; object-fit: contain; display: block; transition: width 0.3s, height 0.3s; }
    .header-slogan img { height: 72px; width: auto; object-fit: contain; display: block; }
    .compact-nav { display: none; align-items: stretch; flex: 1; height: 100%; overflow: visible; }
    .compact-nav .nav-item { flex: 1; position: relative; }
    .header-nav-row { background: transparent; }
    .desktop-nav { display: flex; align-items: stretch; width: 100%; }
    .nav-item { flex: 1; position: relative; }
    .nav-link { display: flex; align-items: center; justify-content: center; gap: 4px; color: #222; font-size: 16.5px; font-weight: 600; text-decoration: none; height: 52px; width: 100%; white-space: nowrap; transition: background 0.18s, color 0.18s; cursor: pointer; letter-spacing: 0.5px; }
    .nav-link:hover, .nav-item:hover .nav-link { background: rgba(0,0,0,0.12); color: #000; }
    .nav-link svg { flex-shrink: 0; }
    .sub-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 170px; box-shadow: 0 6px 24px rgba(0,0,0,0.15); border-top: 3px solid var(--gold); z-index: 200; }
    .nav-item:hover .sub-menu { display: block; }
    .sub-menu a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background 0.15s, color 0.15s; text-decoration: none; }
    .sub-menu a:last-child { border-bottom: none; }
    .sub-menu a:hover { background: var(--primary); color: #fff; }
    .sub-menu--cols { display: none; position: absolute; top: 100%; left: 0; background: #fff; box-shadow: 0 6px 24px rgba(0,0,0,0.15); border-top: 3px solid var(--gold); z-index: 200; flex-direction: row; min-width: 480px; }
    .nav-item:hover .sub-menu--cols { display: flex; }
    .nav-item:last-child .sub-menu, .nav-item:last-child .sub-menu--cols, .nav-item:nth-last-child(2) .sub-menu, .nav-item:nth-last-child(2) .sub-menu--cols { left: auto; right: 0; }
    .sub-menu-col { min-width: 160px; border-right: 1px solid #f0f0f0; flex: 1; }
    .sub-menu-col:last-child { border-right: none; }
    .sub-menu-col a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background 0.15s, color 0.15s; white-space: nowrap; text-decoration: none; }
    .sub-menu-col a:last-child { border-bottom: none; }
    .sub-menu-col a:hover { background: var(--primary); color: #fff; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #333; border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav-row { display: none; background: transparent; height: 48px; align-items: center; justify-content: flex-end; padding: 0 16px; }
    .mobile-menu { display: none; position: fixed; top: 188px; left: 0; right: 0; bottom: 0; background: var(--overlay); z-index: 999; overflow-y: auto; padding-bottom: 40px; }
    .mobile-menu.open { display: block; }
    .mobile-nav-item { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .mobile-nav-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; color: #fff; font-size: 18px; font-weight: 500; cursor: pointer; }
    .mobile-nav-top svg { transition: transform 0.25s; }
    .mobile-nav-item.expanded .mobile-nav-top svg { transform: rotate(90deg); }
    .mobile-sub { display: none; background: rgba(255,255,255,0.05); }
    .mobile-nav-item.expanded .mobile-sub { display: block; }
    .mobile-sub a { display: block; padding: 12px 36px; color: rgba(255,255,255,0.8); font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: color 0.15s; text-decoration: none; }
    .mobile-sub a:hover { color: var(--gold); }
    @media screen and (max-width: 900px) {
      .header-logo-row { height: 80px; padding: 0 16px; }
      .site-logo img { width: auto; height: 52px; max-width: 280px; }
      .header-slogan, .desktop-nav { display: none; }
      .compact-nav { display: none !important; }
      .mobile-nav-row { display: flex; }
      .hamburger { display: flex; }
      .mobile-menu { top: 128px; }
    }

    /* ── iframe 區 ── */
    .iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .iframe-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* 無法嵌入時的提示層 */
    .blocked-msg {
      display: none;
      position: absolute; inset: 0;
      background: #f0f2f8;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 24px;
    }
    .blocked-msg.show { display: flex; }
    .blocked-icon { font-size: 56px; }
    .blocked-title { font-size: 20px; font-weight: 800; color: var(--dark); }
    .blocked-desc { font-size: 14px; color: #666; line-height: 1.7; }
    .blocked-btn {
      display: inline-block; margin-top: 8px;
      background: var(--primary); color: #fff;
      font-size: 15px; font-weight: 700;
      padding: 12px 28px; border-radius: 8px;
      text-decoration: none;
      transition: background 0.18s;
    }
    .blocked-btn:hover { background: #1230a0; }
  </style>
  <link rel="stylesheet" href="mobile.css" />
</head>
<body>

<header class="site-header" id="siteHeader">
  <div class="header-logo-row">
    <div class="header-logo-inner">
      <a class="site-logo" href="index.html">
        <img src="images/logo.png" alt="Rotary 國際扶輪3461地區"
             onerror="this.src='https://pshop.myqr.com.tw/images/RWD_Home/0/201_m.jpg?407'" />
      </a>
      <nav class="compact-nav" id="compactNav"></nav>
      <div class="header-slogan">
        <img src="images/2526slogan.png" alt="2025-26 年度主題" />
      
    </div>
      <button class="hamburger" id="hamburger" aria-label="選單"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="header-nav-row">
    <nav class="desktop-nav" id="desktopNav"></nav>
  </div>
  <div class="mobile-nav-row">
    
  </div>
</header>
<div class="mobile-menu" id="mobileMenu"></div>

<!-- ── iframe 嵌入國際年會網站 ── -->
<div class="iframe-wrap">
  <iframe id="conventionFrame"
          src="https://convention.rotary.org/zh-tw"
          title="國際扶輪年會"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
  </iframe>
  <!-- 若對方拒絕嵌入則顯示此提示 -->
  <div class="blocked-msg" id="blockedMsg">
    <div class="blocked-icon">🔗</div>
    <div class="blocked-title">無法直接內嵌顯示</div>
    <div class="blocked-desc">
      國際年會網站已設定安全政策，不允許在其他網站內嵌顯示。<br>
      請點擊下方按鈕直接前往官方網站。
    </div>
    <a class="blocked-btn" href="https://convention.rotary.org/zh-tw" target="_blank" rel="noopener">
      前往國際年會官網 →
    </a>
  </div>
</div>

<script>
const MENU_DEFAULTS = [
  { title: '扶輪人', columns: [
    [
      { label: 'RI社長',         url: 'ri-president.html' },
      { label: 'RI現況',         url: 'ri-current.html' },
    ],[
      { label: '地區總監',   url: 'governor.html', hi: true },
      { label: '3461各社資訊',   url: 'clubs.html', hi: true },
      { label: '地區組織名錄',   url: 'directory.html', hi: true },
      { label: '年度重要工作目標', url: 'annual-goals.html', hi: true },
    ],[
      { label: '總監當選人',     url: 'governor-elect.html' },
      { label: '總監提名人',     url: '#' },
      { label: '歷屆社長、總監', url: '#' },
    ],
  ]},
  { title: '進行事', items: [
    { label: '地區行事曆', url: 'calendar.html', hi: true },
    { label: '扶輪日',     url: 'https://www.rotary3461.org/RWD/U3/tw/1617/4385/2199-7005' },
    { label: '地區年會',   url: 'conference.html', hi: true },
    { label: '國際年會',   url: 'international-convention.html', hi: true },
    { label: '服務計劃',   url: 'https://www.rotary3461.org/RWD/U3/tw/1617/5350/2273-0' },
  ]},
  { title: '秀成果', items: [
    { label: 'RYLA',   url: 'ryla.html' },
    { label: 'RYE',    url: 'rye.html' },
    { label: 'NGSE',   url: 'ngse.html' },
    { label: 'Rotaract', url: 'rotaract.html' },
    { label: 'Interact', url: 'interact.html', hi: true },
    { label: '生命橋樑', url: '#' },
  ]},
  { title: '回顧庫', items: [
    { label: '總監月刊',     url: 'governor-monthly.html?nocache=1', hi: true },
    { label: '公共形象新聞', url: 'news.html' },
    { label: 'RI 成果展示', url: 'https://spc.rotary.org/project?guid=D334C2BF-6C44-44F2-BDDA-F2448D2796C2' },
    { label: '扶輪之子',     url: '#' },
    { label: '扶輪 Shorts',   url: 'https://www.rotary3461.org/RWD/U3/tw/1617/5323/2112-0' },
    { label: '扶輪百工百業', url: 'https://www.rotary3461.org/RWD/U3/tw/1617/5326/2116-0' },
  ]},
  { title: '學知識', items: [
    { label: '扶輪簡介',   url: 'rotary-intro.html' },
    { label: '七大焦點領域', url: 'focus-areas.html' },
    { label: '扶輪標誌', url: 'rotary-logo.html', hi: true },
    { label: '扶輪基金',   url: 'https://www.rotary3461.org/RWD/U3/tw/1617/5355/2279-0' },
    { label: '扶輪現況',   url: 'https://www.rotary3461.org/RWD/M1_2/tw/1617/4367/3996-0' },
  ]},
  { title: '連結', columns: [
    [
      { label: '台灣12地區網站', url: 'https://taiwan-rotary.org/article/index.php?id=7' },
      { label: '地區扶輪社',   url: 'https://www.rotary3461.org/RWD/U3/tw/1617/4452/2286-0' },
      { label: '地區扶青社',   url: 'https://www.rotary3461.org/RWD/U3/tw/1617/4452/2287-0' },
      { label: '地區扶少圍',   url: 'http://www.rotary3461.org/RWD/M1_1/tw/1617/4417/0' },
      { label: '扶輪公益網',     url: 'https://17rcn.org/' },
      { label: '扶輪領導學院',   url: 'https://www.rlitw.org/' },
    ],[
      { label: '職業服務', url: 'http://sca.myqr.com.tw/NewShop/27/TypeGoods?type2=870' },
      { label: '地區人才庫', url: 'http://sca.myqr.com.tw/NewShop/27/TypeGoods?Name=SP-K-' },
      { label: '相關連結', url: 'https://www.rotary3461.org/RWD/M1_1/tw/1617/4421/0' },
    ],
  ]},
  { title: '更多資源', items: [
    { label: '年度主題',         url: '#' },
    { label: '下載專區',         url: 'http://www.rotary3461.org/RWD/M1_2/tw/1617/4379/4338-0' },
    { label: '品牌中心', url: 'https://brandcenter.rotary.org/' },
    { label: '台灣扶輪下載',     url: 'https://taiwan-rotary.org/download/' },
  ]},
];

const menuData = MENU_DEFAULTS;

function buildNavItems(container) {
  menuData.forEach(group => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    let subHtml = '';
    const mkLink = i => `<a href="${i.url||'#'}" target="${(i.url||'').startsWith('http')?'_blank':'_self'}" rel="noopener"${i.hi?' class="nav-hi"':''}>${i.label}</a>`;
    if (group.columns) {
      const colsHtml = group.columns.map(col =>
        `<div class="sub-menu-col">${col.map(mkLink).join('')}</div>`
      ).join('');
      subHtml = `<div class="sub-menu sub-menu--cols">${colsHtml}</div>`;
    } else {
      subHtml = `<div class="sub-menu">${(group.items||[]).map(mkLink).join('')}</div>`;
    }
    item.innerHTML = `<div class="nav-link">${group.title}<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>${subHtml}`;
    container.appendChild(item);
  });
}
buildNavItems(document.getElementById('desktopNav'));
buildNavItems(document.getElementById('compactNav'));

const mobileMenu = document.getElementById('mobileMenu');
menuData.forEach(group => {
  const item = document.createElement('div');
  item.className = 'mobile-nav-item';
  const allItems = group.columns ? group.columns.flat() : (group.items||[]);
  item.innerHTML = `<div class="mobile-nav-top"><span>${group.title}</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="mobile-sub">${allItems.map(i=>`<a href="${i.url||'#'}" target="${(i.url||'').startsWith('http')?'_blank':'_self'}" rel="noopener">${i.label}</a>`).join('')}</div>`;
  item.querySelector('.mobile-nav-top').addEventListener('click', () => item.classList.toggle('expanded'));
  mobileMenu.appendChild(item);
});

const hamburger = document.getElementById('hamburger');
const siteHeaderEl = document.getElementById('siteHeader');

function syncMobileMenuTop() {
  if (window.innerWidth <= 900 && siteHeaderEl) {
    mobileMenu.style.top = siteHeaderEl.offsetHeight + 'px';
  }
}

hamburger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
  if (open) syncMobileMenuTop();
});

window.addEventListener('scroll', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

window.addEventListener('resize', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

mobileMenu.addEventListener('click', e => {
  if (e.target === mobileMenu) {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  }
});

/* 偵測 iframe 是否被拒絕載入（X-Frame-Options） */
const frame = document.getElementById('conventionFrame');
frame.addEventListener('load', () => {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    if (!doc || doc.body.innerHTML === '') {
      document.getElementById('blockedMsg').classList.add('show');
    }
  } catch(e) {
    /* cross-origin 無法讀取代表有內容但跨域，正常情況 */
  }
});
setTimeout(() => {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    if (doc && doc.body && doc.body.innerHTML === '') {
      document.getElementById('blockedMsg').classList.add('show');
    }
  } catch(e) {}
}, 5000);
</script>
</body>
</html>
