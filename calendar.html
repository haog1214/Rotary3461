    :root {
      --primary: #1a458b;
      --dark:    #0d1e3d;
      --gold:    #f0c040;
      --gold2:   #d4940a;

    /* ── Reveal ── */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.from-left  { transform: translateX(-40px); }
    .reveal.from-right { transform: translateX(40px); }
    .reveal.from-scale { transform: scale(0.93); opacity: 0; }
    .reveal.visible    { opacity: 1 !important; transform: none !important; }
    .reveal.d1 { transition-delay:.1s } .reveal.d2 { transition-delay:.2s }
    .reveal.d3 { transition-delay:.3s }

    /* ════════════ HEADER ════════════ */

    .site-logo img { width: 437px; height: 82px; object-fit: contain; display: block; }
    .header-slogan img { height: 72px; width: auto; display: block; }
    .compact-nav { display: none; align-items: stretch; flex: 1; height: 100%; overflow: visible; }
    .compact-nav .nav-item { flex: 1; position: relative; }
    .header-nav-row { background: transparent; }
    .desktop-nav { display: flex; align-items: stretch; width: 100%; }
    .nav-item { flex: 1; position: relative; }
    .nav-link { display: flex; align-items: center; justify-content: center; gap: 4px; color: #222; font-size: 16.5px; font-weight: 600; height: 52px; width: 100%; white-space: nowrap; transition: background .18s; cursor: pointer; letter-spacing: .5px; }
    .nav-link:hover, .nav-item:hover .nav-link { background: rgba(0,0,0,.12); }
    .sub-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 170px; box-shadow: 0 6px 24px rgba(0,0,0,.15); border-top: 3px solid var(--gold); z-index: 200; }

    .sub-menu a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background .15s; }

    .sub-menu a:hover { background: var(--primary); color: #fff; }
    .sub-menu--cols { display: none; position: absolute; top: 100%; left: 0; background: #fff; box-shadow: 0 6px 24px rgba(0,0,0,.15); border-top: 3px solid var(--gold); z-index: 200; flex-direction: row; min-width: 480px; }
    .nav-item:hover .sub-menu--cols { display: flex; }
    .nav-item:last-child .sub-menu, .nav-item:last-child .sub-menu--cols,
    .nav-item:nth-last-child(2) .sub-menu, .nav-item:nth-last-child(2) .sub-menu--cols { left: auto; right: 0; }
    .sub-menu-col { min-width: 160px; border-right: 1px solid #f0f0f0; flex: 1; }
    .sub-menu-col:last-child { border-right: none; }
    .sub-menu-col a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background .15s; white-space: nowrap; }
    .sub-menu-col a:last-child { border-bottom: none; }
    .sub-menu-col a:hover { background: var(--primary); color: #fff; }

    .site-header.scrolled .header-slogan   { display: none; }
    .site-header.scrolled .header-nav-row  { display: none; }
    .site-header.scrolled .compact-nav     { display: flex; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #333; border-radius: 2px; transition: all .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav-row { display: none; height: 48px; align-items: center; justify-content: flex-end; padding: 0 16px; }

    .mobile-menu.open { display: block; }

    .year-header {

    .cal-table thead th {

    .cal-table tbody tr { border-bottom: 1px solid #e8eef8; transition: background .15s; }
    .cal-table tbody tr:last-child { border-bottom: none; }
    .cal-table tbody tr:hover { background: #f0f6ff; }

    .gcal-wrap {

      border: 1px solid #e5e9f2;
    }

    .footer-icon-btn img { width: 36px; height: 36px; object-fit: contain; display: block; transition: opacity .18s; }
    .footer-icon-btn:hover img { opacity: .75; }
    .footer-bar { background: #f3f4f6; color: #999; font-size: 11px; text-align: center; padding: 10px; }
  </style>

<script>
/* ── Calendar Events Data ── */
const CAL_EVENTS = [
  { date: '2025-09-28', dateLabel: '2025/9/28（日）',       name: '地區－國際淨灘日',            venue: '地點：大甲西勢海堤',       organizer: '主辦：台中中區社、大甲北區社、台中高美社' },
  { date: '2025-10-24', dateLabel: '2025/10/24（五）',      name: '地區－三對三反毒籃球賽',       venue: '地點：沙鹿運動公園籃球場', organizer: '主辦：台中港區社' },
  { date: '2025-11-22', dateLabel: '2025/11/22（六）',      name: '地區－地區扶輪日',             venue: '地點：市民廣場',           organizer: '主辦：台中大屯社' },
  { date: '2025-12-07', dateLabel: '2025/12/7–12/11（日–四）', name: '地區－國際醫療關懷義診',    venue: '地點：菲律賓3830地區',     organizer: '主辦：義診委員會' },
  { date: '2025-12-27', dateLabel: '2025/12/27–2026/1/11', name: '地區－盲人環台路跑公益活動',   venue: '地點：環台',               organizer: '主辦：12地區' },
  { date: '2026-02-01', dateLabel: '2026/2/1–2/2（日–一）',name: '地區－RYLA領袖獎訓練營',       venue: '地點：苗栗自然圈農場',     organizer: '主辦：台中南光社' },
  { date: '2026-02-24', dateLabel: '2026/2/24（二）',       name: '地區－年會高爾夫球賽',         venue: '地點：台中高爾夫球場',     organizer: '主辦：台中東興社' },
  { date: '2026-02-28', dateLabel: '2026/2/28',             name: '地區－228扶輪愛跑',            venue: '地點：台中中央公園',       organizer: '主辦：3461/3462' },
  { date: '2026-03-07', dateLabel: '2026/3/7（六）下午',    name: '地區－地區年會分組討論',        venue: '地點：新民高中',           organizer: '主辦：台中文心社' },
  { date: '2026-03-14', dateLabel: '2026/3/14（六）',       name: '地區－地區年會',               venue: '地點：逢甲大學',           organizer: '主辦：年會委員會' },
  { date: '2026-06-13', dateLabel: '2026/6/13–6/17（六–三）', name: '地區－2026台北扶輪國際年會',  venue: '地點：台北大巨蛋',         organizer: '主辦：HOC' },
  { date: '2026-06-21', dateLabel: '2026/6/21（日）',       name: '地區－2025-26感恩餐會',        venue: '地點：清水成都雅宴',       organizer: '主辦：DG Sunny' },
];

(function renderCalTable() {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = CAL_EVENTS.filter(e => new Date(e.date) >= today).sort((a,b) => new Date(a.date)-new Date(b.date));
  const past     = CAL_EVENTS.filter(e => new Date(e.date) <  today).sort((a,b) => new Date(b.date)-new Date(a.date));
  const tbody = document.getElementById('calTbody');

  // Upcoming
  upcoming.forEach((e, i) => {
    const tr = document.createElement('tr');
    const badge = i === 0 ? '<span class="upcoming-badge">最近活動</span>' : '';
    tr.innerHTML = `<td>${e.dateLabel}</td><td>${e.name}${badge}</td><td>${e.venue}<br>${e.organizer}</td>`;
    tbody.appendChild(tr);
  });

  // Divider
  if (past.length) {
    const div = document.createElement('tr');
    div.className = 'section-divider';
    div.innerHTML = `<td colspan="3">── 已過期活動 ──</td>`;
    tbody.appendChild(div);
  }

  // Past
  past.forEach(e => {
    const tr = document.createElement('tr');
    tr.className = 'past-row';
    tr.innerHTML = `<td>${e.dateLabel}</td><td>${e.name}<span class="expired-badge">已過期</span></td><td>${e.venue}<br>${e.organizer}</td>`;
    tbody.appendChild(tr);
  });
})();
</script>

  const hdr = document.getElementById('siteHeader');
  if (hdr && window.innerWidth <= 900) mm.style.top = hdr.offsetHeight + 'px';
}

  const open = mm.classList.toggle('open');

  document.body.style.overflow = open ? 'hidden' : '';
  if (open) _syncTop();
});
