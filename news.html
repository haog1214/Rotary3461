  const result = [];
  let group = null;
  flat.forEach(item => {

const menuData = MENU_DEFAULTS;

function buildNavItems(container) {
  menuData.forEach(group => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    let subHtml = '';
    const mkLink = i => `<a href="${i.url||'#'}" target="${(i.url||'').startsWith('http')?'_blank':'_self'}" rel="noopener"${i.hi?' class="nav-hi"':''}>${i.label}</a>`;
    if (group.columns) {
      const colsHtml = group.columns.map(col =>
        `<div class="sub-menu-col">${col.map(mkLink).join('')}</div>`
      ).join('');
      subHtml = `<div class="sub-menu sub-menu--cols">${colsHtml}</div>`;
    } else {
      subHtml = `<div class="sub-menu">${(group.items||[]).map(mkLink).join('')}</div>`;
    }
    item.innerHTML = `<div class="nav-link">${group.title}<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>${subHtml}`;
    container.appendChild(item);
  });
}

const mobileMenu = document.getElementById('mobileMenu');
menuData.forEach((group, idx) => {

    </div>`;
  item.querySelector('.mobile-nav-top').addEventListener('click', () => item.classList.toggle('expanded'));
  mobileMenu.appendChild(item);
});

const hamburger = document.getElementById('hamburger');
const siteHeaderEl = document.getElementById('siteHeader');

function syncMobileMenuTop() {
  if (window.innerWidth <= 900 && siteHeaderEl) {
    mobileMenu.style.top = siteHeaderEl.offsetHeight + 'px';
  }
}

hamburger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
  if (open) syncMobileMenuTop();
});

window.addEventListener('scroll', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

window.addEventListener('resize', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

mobileMenu.addEventListener('click', e => {
  if (e.target === mobileMenu) {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── Render ──
function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const grid = document.getElementById('newsGrid');
document.getElementById('newsCount').textContent = `共 ${newsData.length} 則`;

if (!newsData.length) {
  grid.innerHTML = '<div class="empty-state">目前尚無最新消息</div>';
} else {
  newsData.forEach((n, i) => {
    const actUrl = n.activityUrl || n.url || '';
    const actBtnHtml = actUrl
      ? `<a class="news-activity-btn" href="${_esc(actUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
           <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>活動詳情
         </a>` : '';
    const preview = (n.content||'').replace(/\n/g,' ').replace(/🔹/g,'').trim();

    const card = document.createElement('div');
    card.className = 'news-card';
    card.onclick = () => openDetail(i);
    card.innerHTML = `
      <div class="news-img-wrap">
        <img class="news-img" src="${_esc(n.image)}" alt="${_esc(n.title)}"
             onerror="this.style.background='#c8d8e8';this.removeAttribute('src')">
        ${n.date ? `<span class="news-date-badge">${_esc(n.date)}</span>` : ''}
      </div>
      <div class="news-body">
        <div class="news-title">${_esc(n.title)}</div>
        ${preview ? `<div class="news-preview">${_esc(preview)}</div>` : ''}
        <div class="news-footer">
          <span class="news-views">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            ${n.views||0}
          </span>
          <div class="news-btns">
            ${actBtnHtml}
            <button class="news-more" onclick="openDetail(${i});event.stopPropagation()">閱讀更多</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── Detail Modal ──
function openDetail(idx) {
  const n = newsData[idx];
  if (!n) return;
  const overlay = document.getElementById('newsDetailOverlay');
  const actHtml = (n.activityUrl || n.url)
    ? `<div class="news-modal-action"><a href="${_esc(n.activityUrl||n.url)}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        活動詳情
       </a></div>` : '';
  const allImgs = [n.image, ...(n.images||[])].filter(Boolean);
  const imgsHtml = allImgs.length
    ? `<div class="news-modal-imgs">${allImgs.map(u=>`<img src="${_esc(u)}" alt="" onerror="this.style.display='none'">`).join('')}</div>` : '';
  overlay.querySelector('.news-modal').innerHTML = `
    <button class="news-modal-close" onclick="closeDetail()">✕</button>
    ${imgsHtml}
    <div class="news-modal-body">
      <div class="news-modal-meta">${_esc(n.date||'')}</div>
      <div class="news-modal-title">${_esc(n.title)}</div>
      <div class="news-modal-content">${_esc(n.content||'')}</div>
      ${actHtml}
    </div>`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('newsDetailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── storage sync ──
