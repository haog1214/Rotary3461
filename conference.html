    .sub-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; min-width: 170px; box-shadow: 0 6px 24px rgba(0,0,0,0.15); border-top: 3px solid var(--gold); z-index: 200; }

    .nav-item:last-child .sub-menu, .nav-item:last-child .sub-menu--cols, .nav-item:nth-last-child(2) .sub-menu, .nav-item:nth-last-child(2) .sub-menu--cols { left: auto; right: 0; }
    .sub-menu-col { min-width: 160px; border-right: 1px solid #f0f0f0; flex: 1; }
    .sub-menu-col:last-child { border-right: none; }
    .sub-menu-col a { display: block; padding: 16px 17px; font-size: 15.5px; color: var(--dark); border-bottom: 1px solid #f0f0f0; transition: background 0.15s, color 0.15s; white-space: nowrap; text-decoration: none; }

const menuData = MENU_DEFAULTS;

function buildNavItems(container) {
  menuData.forEach(group => {
    const item = document.createElement('div');
    item.className = 'nav-item';
    let subHtml = '';
    const mkLink = i => `<a href="${i.url||'#'}" target="${(i.url||'').startsWith('http')?'_blank':'_self'}" rel="noopener"${i.hi?' class="nav-hi"':''}>${i.label}</a>`;
    if (group.columns) {
      const colsHtml = group.columns.map(col =>
        `<div class="sub-menu-col">${col.map(mkLink).join('')}</div>`
      ).join('');
      subHtml = `<div class="sub-menu sub-menu--cols">${colsHtml}</div>`;
    } else {
      subHtml = `<div class="sub-menu">${(group.items||[]).map(mkLink).join('')}</div>`;
    }
    item.innerHTML = `<div class="nav-link">${group.title}<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></div>${subHtml}`;
    container.appendChild(item);
  });
}
buildNavItems(document.getElementById('desktopNav'));
buildNavItems(document.getElementById('compactNav'));

window.addEventListener('scroll', () => {
  document.getElementById('siteHeader').classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

const mobileMenu = document.getElementById('mobileMenu');
menuData.forEach(group => {
  const item = document.createElement('div');
  item.className = 'mobile-nav-item';
  const allItems = group.columns ? group.columns.flat() : (group.items||[]);
  item.innerHTML = `<div class="mobile-nav-top"><span>${group.title}</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
    <div class="mobile-sub">${allItems.map(i=>`<a href="${i.url||'#'}" target="${(i.url||'').startsWith('http')?'_blank':'_self'}" rel="noopener">${i.label}</a>`).join('')}</div>`;
  item.querySelector('.mobile-nav-top').addEventListener('click', () => item.classList.toggle('expanded'));
  mobileMenu.appendChild(item);
});

const hamburger = document.getElementById('hamburger');
const siteHeaderEl = document.getElementById('siteHeader');

function syncMobileMenuTop() {
  if (window.innerWidth <= 900 && siteHeaderEl) {
    mobileMenu.style.top = siteHeaderEl.offsetHeight + 'px';
  }
}

hamburger.addEventListener('click', () => {
  const open = mobileMenu.classList.toggle('open');
  hamburger.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
  if (open) syncMobileMenuTop();
});

window.addEventListener('scroll', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

window.addEventListener('resize', () => {
  if (mobileMenu.classList.contains('open')) syncMobileMenuTop();
}, { passive: true });

mobileMenu.addEventListener('click', e => {
  if (e.target === mobileMenu) {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  }
});
</script>
